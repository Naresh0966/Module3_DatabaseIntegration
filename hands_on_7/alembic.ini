# alembic.ini
# Hands-On 7 — Alembic Configuration
# ─────────────────────────────────────────────────────────────────────────────
# 🔁 Edit sqlalchemy.url below with your actual credentials before running.
# ─────────────────────────────────────────────────────────────────────────────

[alembic]
script_location = %(here)s/migrations

# Template for migration file names
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

prepend_sys_path = .

path_separator = os

# ─── DATABASE URL ─────────────────────────────────────────────────────────────
# MySQL:
sqlalchemy.url = mysql+mysqlconnector://root:yourpassword@localhost/college_db_orm
#
# PostgreSQL (comment out MySQL line above, uncomment below):
# sqlalchemy.url = postgresql://root:yourpassword@localhost/college_db_orm
# ─────────────────────────────────────────────────────────────────────────────

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
